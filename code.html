<style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #090D16;
      color: #dde4dd;
      margin: 0;
      overflow-x: hidden;
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    .glass-card {
      background: rgba(18, 24, 38, 0.8);
      backdrop-filter: blur(12px);
      border: 1px solid #1E293B;
    }

    .success-glow {
      box-shadow: 0 0 40px -10px rgba(16, 185, 129, 0.3);
    }

    @keyframes scale-in {
      0% { transform: scale(0.9); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes checkmark-draw {
      0% { stroke-dashoffset: 100; }
      100% { stroke-dashoffset: 0; }
    }

    .animate-scale-in {
      animation: scale-in 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .progress-bar-fill {
      width: 0%;
      animation: progress-load 2s ease-in-out forwards;
    }

    @keyframes progress-load {
      to { width: 100%; }
    }
  </style>

<body class="bg-surface text-on-surface selection:bg-primary/30">
<!-- Main Background Layer -->
<div class="fixed inset-0 z-0">

</div>
<!-- Top Bar (Minimal Brand Anchor) -->

<div class="font-headline-md text-headline-md font-bold text-primary tracking-tight">FitNexus</div>

<!-- Animated Checkmark Circle -->
<div class="relative w-24 h-24 mb-stack-md">
<div class="absolute inset-0 rounded-full border-4 border-primary/20 scale-110"></div>
<div class="w-full h-full rounded-full bg-primary-container/20 flex items-center justify-center">
<svg class="w-12 h-12 text-primary" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M5 13l4 4L19 7" stroke-linecap="round" stroke-linejoin="round" stroke-width="3" style="stroke-dasharray: 50; stroke-dashoffset: 50; animation: checkmark-draw 0.6s ease-out forwards 0.3s;"></path>
</svg>
</div>
</div>
<!-- Success Text Content -->
<h1 class="font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface mb-4">¡Éxito!</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-sm mb-stack-lg">
        La rutina ha sido enviada al móvil de <span class="text-primary font-bold">Sofia Martinez</span>.
      </p>

<img alt="Sofia Martinez" class="w-12 h-12 rounded-full border-2 border-primary" data-alt="A professional close-up headshot of a female fitness enthusiast in a high-tech gym setting. She is wearing sleek black athletic gear. The background features blurred neon green gym equipment and soft ambient dark lighting. The mood is energetic, focused, and professional, perfectly aligning with a high-performance luxury fitness application brand identity." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAxojVoK5ceVaaFww4S-9kBZltlxYKLSVUcWcsUqQf-oPLipGjwLtP0Pxw3fEwctoBGzyQve-2-fH-P4N6KIwMr_rbUNRAO3oO8CKDc_2AwbDZw6_PJyyhSzg0_I6MufMirX8ffpoppZcVsRrPhPxc9lxGeMAyXxEssMx3tK5J_27JO_LYgXo5jQfDH0158y9xfsILjmsIaq9qDVSVpXETEKyTsAKaXRYvEGdu3uOjtKEORezIc5ZCzeBUIDMqjqaRplH1F2PmEPfk"/>
<div class="flex-1">
<p class="font-label-md text-label-md text-on-surface">Sofia Martinez</p>
<p class="font-label-sm text-label-sm text-on-surface-variant">Plan de Hipertrofia A1 • Enviado ahora</p>
</div>
<div class="material-symbols-outlined text-primary" data-weight="fill">smartphone</div>
</div>
<!-- Action Buttons -->
<div class="flex flex-col md:flex-row gap-4 w-full">
<button class="flex-1 bg-primary text-on-primary-container font-label-md text-label-md py-3 px-6 rounded-lg font-bold hover:brightness-110 active:scale-95 transition-all shadow-lg">
          Enviar a otro cliente
        </button>
<button class="flex-1 bg-transparent border border-outline text-on-surface font-label-md text-label-md py-3 px-6 rounded-lg font-semibold hover:bg-surface-variant transition-all active:scale-95" onclick="window.location.reload()">
          Volver al Dashboard
        </button>
</div>
<!-- Bottom Progress Feedback (Micro-interaction) -->
<div class="w-full mt-stack-lg">
<div class="flex justify-between items-center mb-2">
<span class="font-label-sm text-label-sm text-on-surface-variant">Sincronización de datos</span>
<span class="font-label-sm text-label-sm text-primary" id="sync-percent">100%</span>
</div>
<div class="w-full h-1.5 bg-surface-container rounded-full overflow-hidden">
<div class="progress-bar-fill h-full bg-gradient-to-r from-primary to-primary/60 rounded-full"></div>
</div>
</div>
</div>
</main>
<!-- Side Navigation (Suppressed for Success Screen focus but hinted for brand consistency) -->
<div class="hidden">
<!-- Using the JSON shared structure logic in the background if navigation was needed -->
<!-- NavigationDrawer would be here -->
</div>
<!-- Footer Info -->
<footer class="fixed bottom-0 w-full p-6 text-center z-10 pointer-events-none">
<p class="font-label-sm text-label-sm text-on-surface-variant/40">FitNexus Pro • Secure Biometric Handshake v4.2</p>
</footer>
<script>
    // Micro-interaction for the sync percentage
    const syncText = document.getElementById('sync-percent');
    let count = 0;
    const interval = setInterval(() => {
      count += 2;
      if (count <= 100) {
        syncText.innerText = count + '%';
      } else {
        clearInterval(interval);
      }
    }, 30);

    // Subtle parallax effect on the success card
    document.addEventListener('mousemove', (e) => {
      const card = document.querySelector('.glass-card');
      const xAxis = (window.innerWidth / 2 - e.pageX) / 50;
      const yAxis = (window.innerHeight / 2 - e.pageY) / 50;
      card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
    });
  </script>
